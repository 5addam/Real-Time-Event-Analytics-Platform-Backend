version: '3.8'

services:
  postgres:
    image: postgres:alpine3.21
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/EVENT_ANALYTICS_PLATFORM_BE
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - postgres
      # - redis

volumes:
  postgres_data: